<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Anton Schneider</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-text">Anton Schneider</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#models">Models</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero" style="padding: 8rem 0 4rem; margin-top: 70px;">
        <div class="container">
            <div class="hero-content" style="text-align: center; margin: 0 auto; max-width: 800px;">
                <div class="hero-tag">Writing</div>
                <h1 class="hero-title" style="font-size: 3rem;">Blog</h1>
                <p class="hero-description" style="margin: 0 auto;">
                    Thoughts on financial modeling, energy systems, and making complex transitions work
                </p>
            </div>
        </div>
    </section>

    <section class="blog-section" style="padding-top: 3rem; background: white;">
        <div class="container">
            <div class="blog-grid" id="all-blog-posts">
                <!-- Loaded via JavaScript -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-text">
                    <p>&copy; 2026 Anton Schneider</p>
                    <p class="footer-location">London / Berlin</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const blogContainer = document.getElementById('all-blog-posts');
            
            blogContainer.innerHTML = blogPosts.map(post => `
                <article class="blog-card">
                    <div class="blog-meta">
                        <span>${new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
                        <span>•</span>
                        <span>${post.category}</span>
                    </div>
                    <h3>${post.title}</h3>
                    <p>${post.excerpt}</p>
                    <a href="blog/${post.slug}.html">Read More →</a>
                </article>
            `).join('');
        });
    </script>
</body>
</html>
