<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Anton Schneider</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Anton Schneider</a>
            <ul class="nav-links">
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#models">Models</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Blog Header -->
    <section class="hero" style="padding: 8rem 0 4rem; margin-top: 60px;">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title" style="font-size: 3rem;">Blog</h1>
                <p class="hero-subtitle">Thoughts on energy, data, and technology</p>
            </div>
        </div>
    </section>

    <!-- Blog Posts -->
    <section class="blog" style="background: white;">
        <div class="container">
            <div class="blog-grid" id="all-blog-posts">
                <!-- Blog posts will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Anton Schneider. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Load all blog posts on blog page
        document.addEventListener('DOMContentLoaded', () => {
            const blogContainer = document.getElementById('all-blog-posts');
            
            blogContainer.innerHTML = blogPosts.map(post => `
                <article class="blog-card">
                    <div class="blog-card-content">
                        <div class="blog-meta">
                            <span>${new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                            <span>•</span>
                            <span>${post.category}</span>
                        </div>
                        <h3>${post.title}</h3>
                        <p>${post.excerpt}</p>
                        <a href="blog/${post.slug}.html">Read More →</a>
                    </div>
                </article>
            `).join('');
        });
    </script>
</body>
</html>
